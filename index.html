<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nail Room Ottawa</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#FBF6F0;color:#2A1A20}
.wrap{max-width:1100px;margin:auto;padding:40px 20px}
h2{text-align:center;font-weight:400}
.gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.gallery-item{aspect-ratio:1;border-radius:18px;overflow:hidden;background:#EED4CC}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.gallery-item:hover img{transform:scale(1.05)}
@media(max-width:700px){.gallery-grid{grid-template-columns:1fr 1fr;gap:10px}}
</style>
</head>
<body>
<div class="wrap">
<h2>Recent Designs</h2>
<div class="gallery-grid" id="insta-feed">
  <div class="gallery-item"></div>
  <div class="gallery-item"></div>
  <div class="gallery-item"></div>
  <div class="gallery-item"></div>
</div>
</div>
<script>
async function loadFeed(){
  const feed=document.getElementById('insta-feed');
  try{
    const r=await fetch('/api/instagram');
    const data=await r.json();
    if(!data.items || !data.items.length) throw new Error();
    feed.innerHTML=data.items.slice(0,4).map(x=>`
      <a class="gallery-item" href="${x.link}" target="_blank" rel="noopener">
        <img src="${x.image}" alt="Nail design">
      </a>`).join('');
  }catch(e){
    feed.innerHTML='<div class="gallery-item"></div>'.repeat(4);
  }
}
loadFeed();
</script>
</body>
</html>
